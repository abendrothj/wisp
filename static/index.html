<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wisp</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --green:   #3fb950;
      --yellow:  #d29922;
      --red:     #f85149;
      --blue:    #58a6ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', ui-monospace, monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo { color: var(--blue); font-weight: 700; font-size: 15px; letter-spacing: 0.05em; }
    .header-right { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 12px; }
    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--muted);
      transition: background 0.3s;
    }
    .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.dead { background: var(--red); }

    /* ── layout ── */
    main {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }

    /* ── cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .card-title {
      padding: 8px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title-actions { display: flex; gap: 8px; }

    /* ── container table ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 7px 14px; text-align: left; white-space: nowrap; }
    th {
      font-size: 11px; font-weight: normal;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    tr:not(:last-child) td { border-bottom: 1px solid rgba(48,54,61,0.6); }
    tbody tr:hover td { background: rgba(255,255,255,0.025); }
    td.name { font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .running { color: var(--green); }
    .stopped { color: var(--red); }
    .cpu-ok   { color: var(--green); }
    .cpu-warn { color: var(--yellow); }
    .cpu-hot  { color: var(--red); font-weight: 700; }
    .healthy  { color: var(--green); }
    .unhealthy{ color: var(--red); }
    .actions { display: flex; gap: 6px; }

    /* ── buttons ── */
    button {
      border: 1px solid var(--border);
      background: #1d2430;
      color: var(--text);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
    }
    button:hover { border-color: var(--blue); color: var(--blue); }
    button.warn:hover { border-color: var(--yellow); color: var(--yellow); }
    button.danger:hover { border-color: var(--red); color: var(--red); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── azure panel ── */
    .metric {
      padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .metric:not(:last-child) { border-bottom: 1px solid rgba(48,54,61,0.6); }
    .metric-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .metric-val { font-weight: 700; font-size: 15px; }
    .bar { width: 80px; height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

    .placeholder { padding: 20px 14px; color: var(--muted); text-align: center; }

    /* ── modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 30;
    }
    .modal {
      width: min(960px, 95vw);
      height: min(75vh, 700px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }
    .modal-head strong { color: var(--text); font-size: 13px; }
    .modal-body {
      padding: 10px 12px;
      white-space: pre-wrap;
      overflow: auto;
      font-size: 12px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <span class="logo">wisp</span>
      <span id="host" style="color:var(--muted);margin-left:12px"></span>
    </div>
    <div class="header-right">
      <span id="refresh"></span>
      <span class="dot dead" id="dot"></span>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="card-title">
        <span>containers</span>
        <div class="title-actions">
          <button id="diskBtn" class="warn">disk usage</button>
          <button id="pruneBtn" class="danger">prune stopped</button>
        </div>
      </div>
      <div id="containers"><div class="placeholder">waiting for data…</div></div>
    </div>

    <div class="card">
      <div class="card-title">azure db</div>
      <div id="azure"><div class="placeholder">not configured</div></div>
    </div>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <strong id="modalTitle">Action Output</strong>
        <button id="modalClose">close</button>
      </div>
      <pre id="modalBody" class="modal-body"></pre>
    </div>
  </div>

  <script>
    const dot     = document.getElementById('dot');
    const hostEl  = document.getElementById('host');
    const refresh = document.getElementById('refresh');
    const diskBtn = document.getElementById('diskBtn');
    const pruneBtn = document.getElementById('pruneBtn');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    modalClose.addEventListener('click', () => hideModal());
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) hideModal();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideModal();
    });

    diskBtn.addEventListener('click', async () => {
      await runAction('/api/action/system-df');
    });

    pruneBtn.addEventListener('click', async () => {
      const ok = window.confirm('Prune stopped containers now? This cannot be undone.');
      if (!ok) return;
      await runAction('/api/action/prune');
    });

    let lastSecs = null;
    setInterval(() => {
      if (lastSecs !== null) {
        const age = Math.floor(Date.now() / 1000) - lastSecs;
        refresh.textContent = age < 60 ? `${age}s ago` : `${Math.floor(age/60)}m ago`;
      }
    }, 1000);

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${location.host}/ws`);

      ws.onopen = () => {
        dot.className = 'dot live';
      };
      ws.onclose = () => {
        dot.className = 'dot dead';
        refresh.textContent = 'reconnecting…';
        setTimeout(connect, 3000);
      };
      ws.onmessage = e => render(JSON.parse(e.data));
    }

    function cpuClass(s) {
      const n = parseFloat(s);
      if (n >= 20) return 'cpu-hot';
      if (n >= 5)  return 'cpu-warn';
      return 'cpu-ok';
    }

    function barColor(pct) {
      if (pct >= 80) return 'var(--red)';
      if (pct >= 50) return 'var(--yellow)';
      return 'var(--green)';
    }

    function healthLabel(status) {
      const s = String(status || '').toLowerCase();
      if (s.includes('unhealthy')) return 'unhealthy';
      if (s.includes('healthy')) return 'healthy';
      if (s.includes('health: starting') || s.includes('starting')) return 'starting';
      return 'none';
    }

    function render(snap) {
      hostEl.textContent = snap.host;
      lastSecs = snap.collected_at;

      /* containers */
      const statsIdx = {};
      (snap.stats || []).forEach(s => { statsIdx[s.Name] = s; });

      if (!snap.containers || snap.containers.length === 0) {
        document.getElementById('containers').innerHTML = '<div class="placeholder">no containers found</div>';
      } else {
        let rows = '';
        for (const c of snap.containers) {
          const s    = statsIdx[c.Names] || {};
          const cpu  = s.CPUPerc  || '–';
          const mem  = s.MemUsage || '–';
          const net  = s.NetIO    || '–';
          const health = healthLabel(c.Status);
          const hc = health === 'healthy' ? 'healthy'
                   : health === 'unhealthy' ? 'unhealthy' : '';
          const sc   = c.State === 'running' ? 'running' : 'stopped';
          const stc  = c.Status.includes('unhealthy') ? 'unhealthy'
                     : c.Status.includes('healthy')   ? 'healthy' : '';
          rows += `<tr>
            <td class="name">${c.Names}</td>
            <td class="${sc}">${c.State}</td>
            <td class="${hc}">${health}</td>
            <td class="${cpuClass(cpu)}">${cpu}</td>
            <td>${mem}</td>
            <td>${net}</td>
            <td class="${stc}">${c.Status}</td>
            <td>
              <div class="actions">
                <button class="warn" onclick="wispStart(${JSON.stringify(c.Names)})">start</button>
                <button class="warn" onclick="wispStop(${JSON.stringify(c.Names)})">stop</button>
                <button onclick="wispInspect(${JSON.stringify(c.Names)})">inspect</button>
                <button class="warn" onclick="wispLogs(${JSON.stringify(c.Names)})">logs</button>
                <button class="danger" onclick="wispRestart(${JSON.stringify(c.Names)})">restart</button>
              </div>
            </td>
          </tr>`;
        }
        document.getElementById('containers').innerHTML =
          `<table><thead><tr>
            <th>Container</th><th>State</th><th>Health</th><th>CPU%</th><th>Mem</th><th>Net I/O</th><th>Status</th><th>Actions</th>
          </tr></thead><tbody>${rows}</tbody></table>`;
      }

      /* azure */
      if (!snap.azure_db) {
        document.getElementById('azure').innerHTML = '<div class="placeholder">not configured</div>';
        return;
      }
      const db = snap.azure_db;
      const dbName = snap.azure_db_name || '(unknown)';
      const dbType = snap.azure_db_type || '(unknown)';
      const metrics = [
        { label: 'CPU',         val: db.cpu_percent,     unit: '%' },
        { label: 'Memory',      val: db.memory_percent,  unit: '%' },
        { label: 'Storage',     val: db.storage_percent, unit: '%' },
        { label: 'ACT CONN',    val: db.connections,     unit: ''  },
      ];
      let html = `<div class="metric"><div>
        <div class="metric-label">DB</div><div class="metric-val">${dbName}</div>
      </div></div>
      <div class="metric"><div>
        <div class="metric-label">Type</div><div class="metric-val" style="font-size:13px">${dbType}</div>
      </div></div>`;
      for (const m of metrics) {
        const isPct  = m.unit === '%';
        const disp   = isPct ? `${m.val.toFixed(1)}%` : m.val.toFixed(0);
        const color  = isPct ? barColor(m.val) : 'var(--text)';
        html += `<div class="metric">
          <div>
            <div class="metric-label">${m.label}</div>
            ${isPct ? `<div class="bar"><div class="bar-fill" style="width:${m.val}%;background:${color}"></div></div>` : ''}
          </div>
          <div class="metric-val" style="color:${color}">${disp}</div>
        </div>`;
      }
      document.getElementById('azure').innerHTML = html;
    }

    async function runAction(url, payload) {
      showModal('Running action…', 'Please wait...');
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload ? JSON.stringify(payload) : undefined,
        });
        const data = await res.json();
        showModal(data.title || 'Action Output', data.output || '', !!data.is_error);
      } catch (err) {
        showModal('Action Error', String(err), true);
      }
    }

    window.wispLogs = async function(name) {
      await runAction('/api/action/logs', { name });
    };

    window.wispStart = async function(name) {
      await runAction('/api/action/start', { name });
    };

    window.wispStop = async function(name) {
      await runAction('/api/action/stop', { name });
    };

    window.wispInspect = async function(name) {
      await runAction('/api/action/inspect', { name });
    };

    window.wispRestart = async function(name) {
      await runAction('/api/action/restart', { name });
    };

    function showModal(title, output, isError = false) {
      modalTitle.textContent = title;
      modalTitle.style.color = isError ? 'var(--red)' : 'var(--text)';
      modalBody.textContent = output;
      modalBackdrop.style.display = 'flex';
      modalBody.scrollTop = 0;
    }

    function hideModal() {
      modalBackdrop.style.display = 'none';
    }

    connect();
  </script>
</body>
</html>
