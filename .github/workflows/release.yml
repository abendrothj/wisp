name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: wisp
            archive_ext: tar.gz
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bin: wisp
            archive_ext: tar.gz
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bin: wisp
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: wisp.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          outdir="dist"
          mkdir -p "$outdir"
          src="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          cp "$src" "$outdir/${{ matrix.bin }}"
          archive="wisp-${tag}-${{ matrix.target }}.tar.gz"
          tar -C "$outdir" -czf "$outdir/$archive" "${{ matrix.bin }}"
          rm "$outdir/${{ matrix.bin }}"

      - name: Prepare archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          $archive = "wisp-$tag-${{ matrix.target }}.zip"
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "dist/$archive" -Force
          Remove-Item "dist/${{ matrix.bin }}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum wisp-* > SHA256SUMS

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/wisp-*
            dist/SHA256SUMS
